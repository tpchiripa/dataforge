services:
  postgres:
    image: postgres:17

    container_name: dataforge-postgres

    restart: unless-stopped

    env_file:
      - ../../.env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - dataforge-network

volumes:
  postgres_data:

networks:
  dataforge-network:
    driver: bridge
