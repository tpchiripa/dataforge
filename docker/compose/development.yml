x-airflow-common: &airflow-common
  build:
    context: ../../
    dockerfile: docker/airflow/Dockerfile

  env_file:
    - ../../.env

  restart: unless-stopped

  environment:
    AIRFLOW_UID: ${AIRFLOW_UID}
    AIRFLOW_HOME: ${AIRFLOW_HOME}
    PYTHONPATH: ${PYTHONPATH}

    # Core
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION}
    AIRFLOW__CORE__DEFAULT_TIMEZONE: ${AIRFLOW__CORE__DEFAULT_TIMEZONE}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__AUTH_MANAGER: ${AIRFLOW__CORE__AUTH_MANAGER}

    # Database
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}

    # API
    AIRFLOW__API__HOST: ${AIRFLOW__API__HOST}
    AIRFLOW__API__PORT: ${AIRFLOW__API__PORT}
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW__API__SECRET_KEY}
    AIRFLOW__API__AUTH_BACKENDS: ${AIRFLOW__API__AUTH_BACKENDS}

    # Logging
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: ${AIRFLOW__LOGGING__BASE_LOG_FOLDER}

    # Webserver
    AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW__WEBSERVER__BASE_URL}

    # Celery
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}

  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ../airflow/logs:/opt/airflow/logs
    - ../airflow/plugins:/opt/airflow/plugins
    - ../airflow/config:/opt/airflow/config

  depends_on:
    postgres:
      condition: service_healthy

    redis:
      condition: service_healthy

    minio-init:
      condition: service_completed_successfully

  networks:
    - dataforge-network

services:

  # ==================================================
  # PostgreSQL
  # ==================================================

  postgres:
    image: postgres:17

    container_name: dataforge-postgres

    restart: unless-stopped

    env_file:
      - ../../.env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - dataforge-network

  # ==================================================
  # Redis
  # ==================================================

  redis:
    image: redis:8

    container_name: dataforge-redis

    restart: unless-stopped

    command: redis-server /usr/local/etc/redis/redis.conf

    ports:
      - "6379:6379"

    volumes:
      - ../../docker/redis/conf/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - dataforge-network

  # ==================================================
  # MinIO Object Storage
  # ==================================================

  minio:
    image: minio/minio:latest

    container_name: dataforge-minio

    restart: unless-stopped

    env_file:
      - ../../.env

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    command: server /data --console-address ":9001"

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - ../../docker/minio/data:/data
      - ../../docker/minio/config:/root/.minio

    networks:
      - dataforge-network

  # ==================================================
  # MinIO Bucket Initialization
  # ==================================================

  minio-init:
    image: minio/mc:latest

    container_name: dataforge-minio-init

    restart: "no"

    env_file:
      - ../../.env

    depends_on:
      - minio

    volumes:
      - ../../docker/minio/init:/init

    entrypoint: >
      /bin/sh -c "
      chmod +x /init/create_buckets.sh &&
      /init/create_buckets.sh
      "

    networks:
      - dataforge-network

  # ==================================================
  # Airflow Initialization
  # ==================================================

  airflow-init:
    <<: *airflow-common

    container_name: dataforge-airflow-init

    restart: "no"

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USERNAME}
      --password ${AIRFLOW_ADMIN_PASSWORD}
      --firstname DataForge
      --lastname Admin
      --role Admin
      --email ${AIRFLOW_ADMIN_EMAIL}
      || true
      "

  # ==================================================
  # Airflow API Server / Web UI
  # ==================================================

  airflow-webserver:
    <<: *airflow-common

    container_name: dataforge-airflow-webserver

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    command: airflow api-server

    ports:
      - "8080:8080"

  # ==================================================
  # Scheduler
  # ==================================================

  airflow-scheduler:
    <<: *airflow-common

    container_name: dataforge-airflow-scheduler

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    command: airflow scheduler

  # ==================================================
  # Triggerer
  # ==================================================

  airflow-triggerer:
    <<: *airflow-common

    container_name: dataforge-airflow-triggerer

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    command: airflow triggerer

  # ==================================================
  # DAG Processor
  # ==================================================

  airflow-dag-processor:
    <<: *airflow-common

    container_name: dataforge-airflow-dag-processor

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    command: airflow dag-processor

volumes:
  postgres_data:
  redis_data:

networks:
  dataforge-network:
    driver: bridge
